services:
  - type: web
    name: opencomputer-pr-review-agent
    runtime: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_APP_SLUG
        sync: false
      - key: GITHUB_PRIVATE_KEY_BASE64
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: OPENCOMPUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
